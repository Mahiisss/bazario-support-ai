# Bazario Support Agent — settings
# tweak these without touching any Python code

embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"
  device: "cpu"           # change to "cuda" if you have a GPU
  normalize: true

vectorstore:
  index_path: "data/vectorstore/faiss_index"
  chunk_size: 800
  chunk_overlap: 100

retrieval:
  top_k: 5               # chunks per query
  score_threshold: 0.3   # drop anything below this similarity

llm:
  model: "gpt-4o"        # or gpt-3.5-turbo if cost matters
  temperature: 0.1       # keep it low — we want consistent, factual answers
  max_tokens: 2000

crew:
  verbose: true
  max_iterations: 3      # per agent
  memory: false          # keeping stateless for now

paths:
  policies_dir: "data/policies"
  outputs_dir: "outputs/resolutions"
  eval_results_dir: "evaluation/results"
  logs_dir: "logs"

logging:
  level: "INFO"          # DEBUG if you're chasing a bug
  save_to_file: true
  log_file: "logs/agent_runs.log"