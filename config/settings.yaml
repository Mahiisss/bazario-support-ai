# Bazario Support Agent — settings
# tweak these without touching any Python code

embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"
  device: "cpu"
  normalize: true

vectorstore:
  index_path: "data/faiss_index"
  chunk_size: 500
  chunk_overlap: 100

retrieval:
  top_k: 3
  score_threshold: 0.3

llm:
  model: "groq/llama-3.3-70b-versatile"
  temperature: 0.1
  max_tokens: 2000

crew:
  verbose: true
  max_iterations: 3
  memory: false

paths:
  policies_dir: "data/policies"
  outputs_dir: "outputs/resolutions"
  eval_results_dir: "evaluation/results"
  logs_dir: "logs"

logging:
  level: "INFO"
  save_to_file: false
  log_file: "logs/agent_runs.log"